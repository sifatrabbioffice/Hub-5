name: GameHub
options:
  # এটি নিশ্চিত করবে যে প্রজেক্টটি Xcode 15 বা তার নিচের ভার্সনে ওপেন হবে
  xcodeVersion: "15.0"
  # অবজেক্ট ভার্সন ৫৬ বা তার নিচে রাখা নিরাপদ (৭৭ এর বদলে)
  objectVersion: 56
  bundleIdPrefix: com.sifatrabbioffice
targets:
  GameHub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [GameHub]
    settings:
      ENABLE_BITCODE: NO
      # আপনার JIT এবং কন্ট্রোলার ফিচারের জন্য এন্টাইটেলমেন্টস পাথ
      CODE_SIGN_ENTITLEMENTS: GameHub/GameHub.entitlements
      SWIFT_VERSION: "5.0"
