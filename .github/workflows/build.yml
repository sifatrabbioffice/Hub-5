name: Build GameHub IPA
on: [push]

jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          brew install xcodegen
          mkdir -p GameHub

      - name: Generate Entitlements
        run: |
          cat <<EOF > GameHub/GameHub.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>dynamic-codesigning</key>
              <true/>
              <key>com.apple.developer.kernel.increased-memory-limit</key>
              <true/>
              <key>get-task-allow</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Clean and Generate Project
        run: |
          # পুরনো প্রজেক্ট ফাইল থাকলে ডিলিট করে নতুন করে জেনারেট করা
          rm -rf GameHub.xcodeproj
          xcodegen generate

      - name: Build and Archive
        run: |
          # সরাসরি Xcode 15.4 পাথ ব্যবহার করে বিল্ড করা
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild archive -project GameHub.xcodeproj \
          -scheme GameHub -sdk iphoneos17.5 \
          -archivePath GameHub.xcarchive \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -r GameHub.xcarchive/Products/Applications/GameHub.app Payload/
          zip -r GameHub.ipa Payload
          
      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: Sifat-GameHub-Final-Build
          path: GameHub.ipa
